<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | LuxeStay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-solid fa-hotel"></i> LuxeStay</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="rooms.html">Rooms</a>
                <a href="#" class="active" id="nav-dashboard">Dashboard</a>
                <a href="#" id="nav-register" class="btn btn-outline" onclick="logout()">Logout</a>
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 80px; height: 80px; margin: 0 auto 1rem; border-radius: 50%; overflow: hidden; box-shadow: var(--shadow-sm); border: 2px solid var(--border-color); position: relative; cursor: pointer;" onclick="document.getElementById('profile-photo-input').click()">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&w=150&q=80" alt="User Avatar" style="width: 100%; height: 100%; object-fit: cover; transition: var(--transition);" id="user-avatar-img">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition);" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0'">
                        <i class="fa-solid fa-camera" style="color: white; font-size: 1.5rem;"></i>
                    </div>
                </div>
                <input type="file" id="profile-photo-input" accept="image/*" style="display: none;">
                <h3 id="user-name">User Name</h3>
                <p style="color: var(--text-muted); font-size: 0.875rem;" id="user-email">user@example.com</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active" onclick="switchTab('bookings')"><i class="fa-solid fa-calendar-check"></i> My Bookings</a>
                <a href="#" onclick="switchTab('profile')"><i class="fa-solid fa-user"></i> Profile Settings</a>
            </nav>
        </aside>

        <main class="dashboard-content">
            <div id="tab-bookings">
                <h2 style="margin-bottom: 1.5rem;">My Bookings</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Room</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-table-body">
                            <!-- Bookings will be loaded here -->
                            <tr>
                                <td colspan="6" style="text-align: center;">Loading bookings...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="tab-profile" style="display: none;">
                <h2 style="margin-bottom: 1.5rem;">Profile Settings</h2>
                <div class="form-container" style="margin: 0; max-width: 500px;">
                    <form id="profileForm">
                        <div id="profile-msg"></div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="profile-name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profile-email" readonly style="background: var(--bg-main); opacity: 0.7; cursor: not-allowed;">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="profile-phone" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('user-name').textContent = user.name || 'User';
            document.getElementById('user-email').textContent = user.email || '';
            
            // If the user has a custom avatar, use it, else check if admin, else default
            if (user.avatar) {
                document.getElementById('user-avatar-img').src = user.avatar;
            } else if (user.role === 'ADMIN') {
                document.getElementById('user-avatar-img').src = 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&w=150&q=80';
            }
            
            // Handle profile photo change
            document.getElementById('profile-photo-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const dataUrl = event.target.result;
                        document.getElementById('user-avatar-img').src = dataUrl;
                        
                        // Update current user
                        user.avatar = dataUrl;
                        localStorage.setItem('user', JSON.stringify(user));
                        
                        // Update user in usersDB
                        let usersDB = JSON.parse(localStorage.getItem('usersDB') || '[]');
                        let userIndex = usersDB.findIndex(u => u.email === user.email);
                        if(userIndex !== -1) {
                            usersDB[userIndex].avatar = dataUrl;
                            localStorage.setItem('usersDB', JSON.stringify(usersDB));
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('profile-name').value = user.name || '';
            document.getElementById('profile-email').value = user.email || '';
            document.getElementById('profile-phone').value = user.phone || '';

            loadBookings();
        });

        function switchTab(tabId) {
            document.querySelectorAll('.dashboard-content > div').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        async function loadBookings() {
            const tbody = document.getElementById('bookings-table-body');
            try {
                const response = await fetch(`${API_BASE_URL}/my-bookings`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                
                if (response.ok) {
                    const bookings = await response.json();
                    if (bookings.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No bookings found.</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = bookings.map(b => `
                        <tr>
                            <td>#${b.id}</td>
                            <td><strong>${b.roomName || 'Room ' + b.roomId}</strong></td>
                            <td>${new Date(b.checkIn).toLocaleDateString()}</td>
                            <td>${new Date(b.checkOut).toLocaleDateString()}</td>
                            <td><span class="badge badge-${b.status === 'CONFIRMED' ? 'success' : (b.status === 'CANCELLED' ? 'error' : 'warning')}">${b.status}</span></td>
                            <td>
                                ${b.status === 'CONFIRMED' ? `<button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="cancelBooking(${b.id})">Cancel</button>` : '-'}
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--error-color);">Failed to load bookings. Try again later.</td></tr>';
                }
            } catch (error) {
                console.error(error);
                // Fallback to local storage mock data
                const mockBookings = JSON.parse(localStorage.getItem('mockBookings') || '[]');
                if (mockBookings.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No bookings found.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = mockBookings.map(b => {
                    let canCancel = false;
                    if (b.status === 'CONFIRMED') {
                        if (b.timestamp) {
                            canCancel = (Date.now() - b.timestamp) <= 60000;
                        } else {
                            canCancel = true; // Fallback for old mock data
                        }
                    }
                    
                    return `
                    <tr>
                        <td>#${b.id}</td>
                        <td><strong>${b.roomName}</strong></td>
                        <td>${new Date(b.checkIn).toLocaleDateString()}</td>
                        <td>${new Date(b.checkOut).toLocaleDateString()}</td>
                        <td><span class="badge badge-${b.status === 'CONFIRMED' ? 'success' : (b.status === 'CANCELLED' ? 'error' : 'warning')}">${b.status}</span></td>
                        <td>
                            ${canCancel 
                                ? `<button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="cancelBooking(${b.id})">Cancel</button>` 
                                : (b.status === 'CONFIRMED' ? '<span style="font-size: 0.8rem; color: var(--text-muted);"><i class="fa-solid fa-lock"></i> Locked</span>' : '-')}
                        </td>
                    </tr>
                    `;
                }).reverse().join('');
            }
        }

        async function cancelBooking(id) {
            let mockBookings = JSON.parse(localStorage.getItem('mockBookings') || '[]');
            const booking = mockBookings.find(b => b.id === id);
            
            if (booking && booking.timestamp) {
                if (Date.now() - booking.timestamp > 60000) {
                    alert('Cancellation period has expired. Bookings can only be cancelled within 1 minute of purchase.');
                    loadBookings();
                    return;
                }
            }

            if(!confirm('Are you sure you want to cancel this booking?')) return;
            try {
                // Mock cancel in localStorage
                mockBookings = mockBookings.map(b => {
                    if(b.id === id) { b.status = 'CANCELLED'; }
                    return b;
                });
                localStorage.setItem('mockBookings', JSON.stringify(mockBookings));
                
                alert('Booking cancelled successfully');
                loadBookings();
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
            }
        }
    </script>
</body>
</html>
