<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LuxeStay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-solid fa-hotel"></i> LuxeStay</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="rooms.html">Rooms</a>
                <a href="login.html" class="active" id="nav-login">Login</a>
                <a href="register.html" id="nav-register" class="btn btn-primary">Sign Up</a>
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="auth-layout">
        <div class="auth-image" style="background-image: url('https://images.unsplash.com/photo-1542314831-c6a4d14d837e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
            <div class="auth-image-content">
                <h2 style="font-size: 3rem; margin-bottom: 1rem;">Welcome Back</h2>
                <p style="font-size: 1.25rem; opacity: 0.9;">Sign in to access your bookings and discover new luxury stays.</p>
            </div>
        </div>
        
        <div class="auth-form-wrapper">
            <div class="form-container" style="margin: 0; width: 100%; box-shadow: none; border: none; background: transparent;">
                <div class="form-header" style="text-align: left; margin-bottom: 2.5rem;">
                    <h2>Sign In</h2>
                    <p>Enter your details below to access your account</p>
                </div>
                <form id="loginForm">
                    <div id="error-message" style="color: var(--error-color); margin-bottom: 1rem; padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border-radius: var(--radius-md); display: none;"></div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">Sign In</button>
                    <div style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                        Don't have an account? <a href="register.html" style="color: var(--primary-color); font-weight: 600;">Sign up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
