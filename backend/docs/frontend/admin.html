<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | LuxeStay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-solid fa-hotel"></i> LuxeStay Admin</a>
            <div class="nav-links">
                <a href="#" class="active" id="nav-dashboard">Admin Panel</a>
                <a href="#" id="nav-register" class="btn btn-outline" onclick="logout()">Logout</a>
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="active" onclick="switchTab('rooms')"><i class="fa-solid fa-bed"></i> Manage Rooms</a>
                <a href="#" onclick="switchTab('bookings')"><i class="fa-solid fa-calendar-check"></i> Manage Bookings</a>
                <a href="#" onclick="switchTab('users')"><i class="fa-solid fa-users"></i> Manage Users</a>
            </nav>
        </aside>

        <main class="dashboard-content">
            <!-- Manage Rooms -->
            <div id="tab-rooms">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Manage Rooms</h2>
                    <button class="btn btn-primary" onclick="showAddRoomModal()"><i class="fa-solid fa-plus"></i> Add Room</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Room Name</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-rooms-body">
                            <tr><td colspan="6" style="text-align: center;">Loading rooms...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Manage Bookings -->
            <div id="tab-bookings" style="display: none;">
                <h2 style="margin-bottom: 1.5rem;">All Bookings</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>User ID</th>
                                <th>Room ID</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-bookings-body">
                            <tr><td colspan="7" style="text-align: center;">Loading bookings...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Manage Users -->
            <div id="tab-users" style="display: none;">
                <h2 style="margin-bottom: 1.5rem;">Registered Users</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-body">
                            <tr><td colspan="5" style="text-align: center;">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('role');
            if (role !== 'ADMIN') {
                alert('Unauthorized access. Admin privileges required.');
                window.location.href = 'index.html';
                return;
            }
            loadAdminData();
        });

        function switchTab(tabId) {
            document.querySelectorAll('.dashboard-content > div').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function loadAdminData() {
            // Mock data for UI demonstration until backend is complete
            document.getElementById('admin-rooms-body').innerHTML = `
                <tr>
                    <td>1</td>
                    <td><img src="https://images.unsplash.com/photo-1611892440504-42a792e24d32?ixlib=rb-4.0.3&w=100&q=80" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"></td>
                    <td><strong>Deluxe Ocean View</strong></td>
                    <td>$299</td>
                    <td><span class="badge badge-success">Available</span></td>
                    <td>
                        <button class="btn btn-outline" style="padding: 0.25rem 0.5rem;"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-primary" style="padding: 0.25rem 0.5rem; background: var(--error-color); border-color: var(--error-color);"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `;
            
            document.getElementById('admin-bookings-body').innerHTML = `
                <tr>
                    <td>1042</td>
                    <td>5</td>
                    <td>1</td>
                    <td>2026-06-15</td>
                    <td>2026-06-20</td>
                    <td><span class="badge badge-success">CONFIRMED</span></td>
                    <td>
                        <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">Cancel</button>
                    </td>
                </tr>
            `;

            document.getElementById('admin-users-body').innerHTML = `
                <tr>
                    <td>5</td>
                    <td>John Doe</td>
                    <td>john@example.com</td>
                    <td><span class="badge badge-warning">USER</span></td>
                    <td>
                        <button class="btn btn-primary" style="padding: 0.25rem 0.5rem; background: var(--error-color); border-color: var(--error-color);"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Admin User</td>
                    <td>admin@luxestay.com</td>
                    <td><span class="badge badge-success">ADMIN</span></td>
                    <td>-</td>
                </tr>
            `;
        }

        function showAddRoomModal() {
            alert('Add Room functionality will be connected to POST /api/rooms backend endpoint.');
        }
    </script>
</body>
</html>
