<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LuxeStay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-solid fa-hotel"></i> LuxeStay</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="rooms.html">Rooms</a>
                <a href="login.html" id="nav-login">Login</a>
                <a href="register.html" class="active" id="nav-register" class="btn btn-primary">Sign Up</a>
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="auth-layout">
        <div class="auth-image" style="background-image: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
            <div class="auth-image-content">
                <h2 style="font-size: 3rem; margin-bottom: 1rem;">Start Your Journey</h2>
                <p style="font-size: 1.25rem; opacity: 0.9;">Join LuxeStay today to unlock exclusive deals and a seamless booking experience.</p>
            </div>
        </div>

        <div class="auth-form-wrapper">
            <div class="form-container" style="margin: 0; width: 100%; box-shadow: none; border: none; background: transparent;">
                <div class="form-header" style="text-align: left; margin-bottom: 2.5rem;">
                    <h2>Create an Account</h2>
                    <p>Enter your details below to get started</p>
                </div>
                <form id="registerForm">
                    <div id="error-message" style="color: var(--error-color); margin-bottom: 1rem; padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border-radius: var(--radius-md); display: none;"></div>
                    <div id="success-message" style="color: var(--success-color); margin-bottom: 1rem; padding: 0.75rem; background: rgba(16, 185, 129, 0.1); border-radius: var(--radius-md); display: none;"></div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required placeholder="+1 (555) 000-0000">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                        <small style="color: var(--text-muted); display: block; margin-top: 0.25rem;">Must be at least 6 characters</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem; margin-top: 0.5rem;">Create Account</button>
                    
                    <div style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                        Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
